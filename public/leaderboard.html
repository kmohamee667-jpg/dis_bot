<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Leaderboard</title>
    <link rel="stylesheet" href="leaderboard.css">
</head>

<body>
<div class="container">

    <div class="title">🏆 Golden Galaxy Leaderboard</div>

    <!-- PODIUM -->
    <div class="podium-container">

        <div class="podium-item center">
            <div>👑</div>
            <div class="avatar"></div>
            <div class="name">Ahmed</div>
            <div class="time">5h</div>
        </div>

        <div class="podium-item left">
            <div>🥈</div>
            <div class="avatar"></div>
            <div class="name">Ali</div>
            <div class="time">4h</div>
        </div>

        <div class="podium-item right">
            <div>🥉</div>
            <div class="avatar"></div>
            <div class="name">Omar</div>
            <div class="time">3h</div>
        </div>

    </div>

    <!-- USERS -->
    <div class="users-container">

        <div class="user-item">
            <div class="user-rank">4</div>
            <div class="user-avatar"></div>

            <div class="user-info">
                <div class="user-name">Mostafa</div>
                <div class="user-time">2h 30m</div>
            </div>
        </div>

        <div class="user-item highlight">
            <div class="user-rank">5</div>
            <div class="user-avatar"></div>

            <div class="user-info">
                <div class="user-name">You</div>
                <div class="user-time">2h</div>
            </div>
        </div>

    </div>

</div>
</body>
</html>
