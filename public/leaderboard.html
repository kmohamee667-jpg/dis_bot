<!-- Leaderboard HTML Template -->
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <link rel="stylesheet" href="leaderboard.css">
</head>
<body>
    <div class="container">
        <div class="title">🏆 Leaderboard - Study Time</div>
        
        <!-- Top 3 Podium -->
        <div class="podium-container">
            <div id="rank-1" class="podium-item center">
                <div class="icon">👑</div>
                <div class="avatar"></div>
                <div class="name"></div>
                <div class="time"></div>
            </div>
            
            <div id="rank-2" class="podium-item left">
                <div class="icon">🥈</div>
                <div class="avatar"></div>
                <div class="name"></div>
                <div class="time"></div>
            </div>
            
            <div id="rank-3" class="podium-item right">
                <div class="icon">🥉</div>
                <div class="avatar"></div>
                <div class="name"></div>
                <div class="time"></div>
            </div>
        </div>

        <!-- Rest of users -->
        <div class="users-container" id="users-list">
            <!-- Generated by JavaScript -->
        </div>
    </div>

    <script src="leaderboard.js"></script>
</body>
</html>
